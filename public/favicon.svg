<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">

  <!-- 1. Hintergrund: Abgerundetes Quadrat -->
  <rect x="0" y="0" width="1024" height="1024" rx="120" ry="120" fill="#0e0e0e"/>

  <!-- DEFINITIONEN -->
  <defs>
    <!-- Die Form eines einzelnen Elektrons -->
    <circle id="electron-dot" r="32" fill="none" stroke="#ffffff" stroke-width="28"/>

    <!-- Die Form eines Orbits -->
    <ellipse id="orbit-path" cx="512" cy="512" rx="145" ry="400" fill="none" stroke="#ffffff" stroke-width="28" stroke-linecap="round"/>

    <!-- MASKE: Erzeugt die Luecken an den exakten Positionen der Elektronen -->
    <mask id="atom-mask">
      <!-- Alles Weiss ist sichtbar -->
      <rect width="1024" height="1024" fill="white"/>

      <!-- Luecken (Schwarz) erzeugen den Abstand zum Punkt (Radius 65) -->

      <!-- Luecke fuer Elektron 1 (Neu: Unten Rechts) -->
      <circle cx="854" cy="718" r="65" fill="black"/>

      <!-- Luecke fuer Elektron 2 (Oben Rechts via Rotation) -->
      <g transform="rotate(60 512 512)">
        <circle cx="512" cy="112" r="65" fill="black"/>
      </g>

      <!-- Luecke fuer Elektron 3 (Unten Links) -->
      <circle cx="312" cy="742" r="65" fill="black"/>
    </mask>
  </defs>

  <!-- 2. KERN (Zentraler Ring) -->
  <circle cx="512" cy="512" r="45" fill="none" stroke="#ffffff" stroke-width="28"/>

  <!-- 3. ORBITALE (BAHNEN) mit Maske -->
  <g mask="url(#atom-mask)">
    <!-- Vertikale Bahn -->
    <use href="#orbit-path"/>
    <!-- Bahn rotiert 60 Grad -->
    <use href="#orbit-path" transform="rotate(60 512 512)"/>
    <!-- Bahn rotiert -60 Grad -->
    <use href="#orbit-path" transform="rotate(-60 512 512)"/>
  </g>

  <!-- 4. ELEKTRONEN (PUNKTE) -->

  <!-- Elektron 1: Neu positioniert auf 854, 718 -->
  <use href="#electron-dot" x="854" y="718"/>

  <!-- Elektron 2: Beibehalten Oben Rechts (relativ rotiert) -->
  <g transform="rotate(60 512 512)">
    <use href="#electron-dot" x="512" y="112"/>
  </g>

  <!-- Elektron 3: Beibehalten Unten Links -->
  <use href="#electron-dot" x="312" y="742"/>

</svg>
